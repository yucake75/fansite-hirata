<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>TOP｜らっだぁ非公式ファンサイト</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/index.css">
    <script src="/js/style.js" defer></script>
    <script src="/js/index.js" defer></script>
</head>

<body>
    <header>
        <ul>
            <li><a href="#">新規登録</a></li>
            <li><a href="#">ログイン</a></li>
        </ul>
    </header>

    <main>
        <div class="site-header">
            <h1>らっだぁ非公式ファンサイト</h1>
            <!-- 画像を挿入する -->
            

            <!-- ナビゲーションバー -->
            <ul class="nav-main">
                <!-- チャンネルのリンクやアーカイブの年別、カテゴリ、検索など -->
                <li><a href="#">ホーム</a></li>
                <li><a href="#">アーカイブ</a></li>
                <li><a href="#">カテゴリ</a></li>
                <li><a href="#">らっだぁ語録</a></li>
                <li><a href="#">検索</a></li>
            </ul>
        </div>


        <!-- 
        ＜ ルール＞
        ページ遷移 → a
        処理（JS） → button 
        -->
    
        <div class="mainpage">

            <!-- メインビジュアル -->
            <section class="overview">
                <h2>ホームページについて</h2> <!-- タイトル -->
                <p>このページは作者がアーカイブを見やすくするために作られたアプリです。</p> <!-- 説明文 -->
                <a href="#" class="">アーカイブを見る</a> <!-- ゲームカテゴリ別検索 -->
                <button>アーカイブを追加</button> <!-- アーカイブ追加ボタン -->
            </section>

            <!-- メインコンテンツ（最初に表示されるページ） -->
            <section class="latest">
                <h2>最新の配信</h2>

                <div class="archive-latest">
                    <!-- 最新の配信・動画の記事５つを表示する -->
                    <!-- <article>
                        <h3>配信タイトル</h3>
                        <p class="date">日付</p>
                        <p class="category">カテゴリ</p>
                        <a href="#">動画リンク</a>
                    </article> -->
                </div>
            </section>

        </div>

    </main>

    <footer>
        <p>© 2026 Unofficial Fansite</p>
    </footer>
