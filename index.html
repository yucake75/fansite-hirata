<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>平田くん アーカイブまとめサイト</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="site-header">
    <div class="inner">
      <div class="header-left">
        <div class="site-logo">
          <span class="logo-icon">◉</span>
          <div>
            <p class="site-name">平田くん アーカイブ集</p>
            <p class="site-sub">ツイキャスアーカイブまとめサイト</p>
          </div>
        </div>
      </div>
      <nav class="site-nav">
        <a href="#" class="nav-link active">アーカイブ</a>
        <a href="#" class="nav-link">プロフィール</a>
        <a href="#" class="nav-link">更新履歴</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="inner">

      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" class="search-input" placeholder="タイトルで検索..." />
      </div>

      <div class="filter-row" id="filterRow">
        <button class="tag active" data-cat="all">すべて</button>
        <button class="tag" data-cat="game">ゲーム実況</button>
        <button class="tag" data-cat="talk">雑談</button>
        <button class="tag" data-cat="collab">コラボ</button>
        <button class="tag" data-cat="other">その他</button>
      </div>

      <p class="result-count" id="resultCount"></p>

      <ul class="archive-list" id="archiveList">
        <!-- カードはJSで描画されます -->
      </ul>

      <div class="pagination" id="pagination"></div>

      <p class="update-note">最終更新：2025/05/12</p>

    </div>
  </main>

  <script src="/js/main.js"></script>
</body>
</html>
