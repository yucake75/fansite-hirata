<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>平田くん アーカイブまとめサイト</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="site-header">
    <div class="inner">
      <div class="header-left">
        <div class="site-logo">
          <span class="logo-icon">◉</span>
          <div>
            <p class="site-name">平田くん アーカイブ集</p>
            <p class="site-sub">ツイキャスアーカイブまとめサイト</p>
          </div>
        </div>
      </div>

        <!-- タブボタン -->
        <div id="tabRow">
            <button class="tag active" data-tab="archive">アーカイブ</button>
            <button class="tag" data-tab="game">ゲームから探す</button>
        </div>
    </div>
  </header>

  <main class="main">
    <div class="inner">

        <!-- アーカイブセクション（既存をこれで囲む） -->
        <section id="archiveSection">

            <div class="social-links">
                <a class="btn-youtube" href="https://www.youtube.com/channel/UCadz_t351hPYArMeHOufq6A" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c2.4 0 5.7.25 7.44.6a2.7 2.7 0 0 1 2 1.93C21.75 6.9 22 9 22 12s-.25 5.1-.56 6.47a2.7 2.7 0 0 1-2 1.93C17.7 20.75 14.4 21 12 21s-5.7-.25-7.44-.6a2.7 2.7 0 0 1-2-1.93C2.25 17.1 2 15 2 12s.25-5.1.56-6.47a2.7 2.7 0 0 1 2-1.93C6.3 3.25 9.6 3 12 3Zm-2 5.6v6.8L16 12l-6-3.4Z"/></svg>
                YouTube
                </a>
                <a class="btn-twicas" href="https://en.twitcasting.tv/jr_hirata" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h13l3 4v12H4V4Zm3 4v8h10V9.2L16 8H7Z"/></svg>
                ツイキャス
                </a>
            </div>

            <div class="search-wrap">
            <span class="search-icon">⌕</span>
                <input type="text" id="searchInput" class="search-input" placeholder="タイトルで検索..." />
            </div>

            <div class="filter-row" id="filterRow">
                <button class="tag active" data-cat="all">すべて</button>
                <button class="tag" data-cat="game">ゲーム実況</button>
                <button class="tag" data-cat="talk">雑談</button>
                <button class="tag" data-cat="collab">コラボ</button>
                <button class="tag" data-cat="other">その他</button>
            </div>

            <p class="result-count" id="resultCount"></p>

            <ul class="archive-list" id="archiveList">
                <!-- カードはJSで描画されます -->
            </ul>

            <div class="pagination" id="pagination"></div>

            <p class="update-note" id="updateNote">最終更新：<span id="updatedAt">--</span></p>
        </section>

         <!-- ゲームセクション（新規） -->
        <section id="gameSection" style="display:none">
            <div id="gameTab"></div>
        </section>

        <div id="gameModal" class="modal-overlay" style="display:none">
            <div class="modal-window">
                <div class="modal-header">
                <h3 id="modalTitle" class="modal-game-title"></h3>
                <button id="modalClose" class="modal-close">✕</button>
                </div>
                <ul id="modalArchiveList" class="archive-list"></ul>
            </div>
        </div>
